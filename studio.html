<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tiny Theft Auto — Studio (Mixamo)</title>
<style>
  html,body{margin:0;height:100%;width:100%;font-family:ui-sans-serif,system-ui,Segoe UI,Roboto,sans-serif;background:#fff;color:#1a1a1a}
  *{box-sizing:border-box}
  .studio{display:grid;grid-template-columns:1fr 340px;height:100vh;width:100vw}
  .viewport{position:relative;min-width:0;min-height:0;background:#fff}
  .viewport canvas{display:block;width:100%;height:100%}
  .panel{height:100%;overflow-y:auto;padding:18px;border-left:1px solid #e6e6e6;background:#fafafa;display:flex;flex-direction:column;gap:12px}
  .panel h1{font-size:18px;margin:0;font-weight:800}
  .status{font-size:11px;color:#888}
  .now{font-size:13px;color:#2f9fd6;font-weight:700;min-height:18px}
  .sec{font-size:11px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:.05em;margin-top:6px}
  .hr{height:1px;background:#e6e6e6;margin:2px 0}
  .clips{display:flex;flex-wrap:wrap;gap:6px}
  .clipbtn{padding:7px 11px;border-radius:8px;cursor:pointer;font-size:13px;border:1px solid #ccc;background:#fff;color:#222}
  .clipbtn:hover{border-color:#2f9fd6}
  .clipbtn.active{border-color:#2f9fd6;background:#2f9fd6;color:#fff;font-weight:700}
  .row{display:flex;align-items:center;gap:9px;font-size:13px;color:#333}
  input[type=range]{flex:1}
  @media (max-width:820px),(orientation:portrait){
    .studio{grid-template-columns:1fr;grid-template-rows:1fr auto}
    .panel{border-left:none;border-top:1px solid #e6e6e6;max-height:56vh}
    .viewport{min-height:44vh}
  }
</style>
</head>
<body>
<div class="studio">
  <div class="viewport"><canvas id="c"></canvas></div>
  <div class="panel">
    <h1>🎬 Studio — Mixamo</h1>
    <div class="status">personagem + clips Mixamo, dirigidos pela MESMA FSM (MIXAMO_TABLE) do jogo</div>
    <div class="now" id="now"></div>
    <div class="sec">Animações (AnimState)</div>
    <div class="clips" id="states"></div>
    <div class="hr"></div>
    <div class="sec">Locomoção / Mira</div>
    <label class="row">Veloc. <input type="range" id="speed" min="0" max="9" step="0.1" value="0"><span id="speedV">0</span></label>
    <label class="row">Mira <input type="range" id="aim" min="-0.85" max="0.95" step="0.01" value="0"><span id="aimV">0</span></label>
    <label class="row"><input type="checkbox" id="orbit" checked> Auto-girar</label>
    <div class="status" id="status" style="margin-top:auto">carregando…</div>
  </div>
</div>
<!-- hidden #game canvas: insurance in case a transitive import expects it -->
<canvas id="game" width="4" height="4" style="position:fixed;left:-9999px;width:4px;height:4px"></canvas>
<script type="module" src="/studio.tsx"></script>
</body>
</html>
