<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Tiny Theft Auto — Mixamo Viewer</title>
<style>
  html,body{margin:0;height:100%;background:#fff;font:13px system-ui,Segoe UI,sans-serif;overflow:hidden}
  #app{display:flex;height:100%}
  #view{flex:1;position:relative;min-width:0}
  canvas{display:block;width:100%;height:100%}
  #panel{width:240px;padding:14px;background:#0d0d12;color:#dcdce4;overflow:auto;box-sizing:border-box}
  h1{font-size:15px;margin:0 0 2px}
  .sub{color:#8a8a96;font-size:11px;margin-bottom:10px}
  .now{color:#9dff2e;font-size:12px;margin:8px 0;min-height:16px}
  button{display:block;width:100%;margin:3px 0;padding:7px 9px;text-align:left;border:1px solid #2a2a33;border-radius:6px;background:#1a1a22;color:#dcdce4;cursor:pointer;font:inherit}
  button:hover{background:#23232c}
  button.active{background:#2f9fd6;color:#fff;border-color:#2f9fd6}
  .foot{margin-top:14px;color:#6a6a76;font-size:10px}
</style>
</head>
<body>
<div id="app">
  <div id="view"><canvas id="c"></canvas></div>
  <div id="panel">
    <h1>🎬 Mixamo Viewer</h1>
    <div class="sub">jogador + NPCs, TODOS clonados de UMA base Mixamo (1 mesh, 1 set de clips), recoloridos por região</div>
    <div class="now" id="now"></div>
    <div id="buttons"></div>
    <div class="foot" id="status">carregando…</div>
  </div>
</div>
<script type="module" src="/mixamo.tsx"></script>
</body>
</html>
