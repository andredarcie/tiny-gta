<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tiny Crime — Studio</title>
<style>
  html,body,#root{margin:0;height:100%;width:100%;
    font-family:ui-sans-serif,system-ui,Segoe UI,Roboto,sans-serif;background:#fff;color:#1a1a1a}
  *{box-sizing:border-box}

  /* Two areas: the character viewport (fills the rest) + a fixed-width control panel
     that never collapses. Stacks vertically on narrow/portrait screens. */
  .studio{display:grid;grid-template-columns:1fr 360px;height:100vh;width:100vw}
  .viewport{position:relative;min-width:0;min-height:0;background:#fff}
  .viewport canvas{display:block;width:100%;height:100%}

  .panel{height:100%;overflow-y:auto;padding:20px;border-left:1px solid #e6e6e6;background:#fafafa;
    display:flex;flex-direction:column;gap:14px}
  .panel h1{font-size:19px;margin:0;font-weight:800}
  .status{font-size:12px;color:#666}
  .sec{font-size:12px;font-weight:700;color:#444;text-transform:uppercase;letter-spacing:.04em;margin-top:4px}
  .hr{height:1px;background:#e6e6e6;margin:2px 0}

  .clips{display:flex;flex-wrap:wrap;gap:8px}
  .clipbtn{padding:9px 13px;border-radius:9px;cursor:pointer;font-size:14px;border:1px solid #ccc;
    background:#fff;color:#222;transition:none}
  .clipbtn:hover{border-color:#2f9fd6}
  .clipbtn.active{border-color:#2f9fd6;background:#2f9fd6;color:#fff;font-weight:700}

  .btn{padding:10px 12px;border-radius:9px;border:1px solid #ccc;background:#fff;cursor:pointer;font-size:14px}
  .btn:hover{border-color:#999}
  .row{display:flex;align-items:center;gap:9px;font-size:14px}
  .now{font-size:13px;color:#555}
  input[type=range]{width:100%}
  .out{width:100%;min-height:52px;resize:vertical;font:12px/1.4 ui-monospace,Consolas,monospace;
    padding:8px;border:1px solid #ccc;border-radius:8px;background:#fff;color:#111}

  /* Narrow / portrait: stack the panel UNDER the viewport, both fully visible. */
  @media (max-width:820px),(orientation:portrait){
    .studio{grid-template-columns:1fr;grid-template-rows:1fr auto}
    .panel{border-left:none;border-top:1px solid #e6e6e6;max-height:58vh}
    .viewport{min-height:42vh}
  }
</style>
</head>
<body>
<div id="root"></div>
<!-- Hidden #game canvas: importing the vehicle models pulls in the game engine,
     which grabs #game on import (it builds an unused offscreen renderer on it). -->
<canvas id="game" width="4" height="4" style="position:fixed;left:-9999px;width:4px;height:4px"></canvas>
<!-- React served LOCALLY (no CDN) so the page works in any browser, offline, behind
     ad-blockers. These UMD builds expose window.React / window.ReactDOM. -->
<script src="/vendor/react.production.min.js"></script>
<script src="/vendor/react-dom.production.min.js"></script>
<script type="module" src="/studio.tsx"></script>
</body>
</html>
